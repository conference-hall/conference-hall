services:
  postgres:
    container_name: ch_postgres
    image: postgres:16-alpine
    volumes:
      - ./docker/postgres:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    environment:
      POSTGRES_MULTIPLE_DATABASES: '"conference-hall","conference-hall-test"'
      POSTGRES_HOST_AUTH_METHOD: trust

  redis:
    container_name: ch_redis
    image: redis:7-alpine
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - '6379:6379'

  firebase-emulators:
    container_name: ch_firebase_emulators
    build:
      context: ./docker/firebase
    volumes:
      - ./docker/firebase/fixtures:/app/fixtures:ro
    ports:
      - '9099:9099'
      - '9199:9199'
      - '4000:4000'

  minio:
    container_name: ch_minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  minio-setup:
    container_name: ch_minio_setup
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do
        echo 'Waiting for MinIO...'; sleep 1;
      done;
      mc mb --ignore-existing local/conference-hall;
      mc mb --ignore-existing local/conference-hall-test;
      exit 0;
      "

  mailpit:
    container_name: ch_mailpit
    image: axllent/mailpit:latest
    ports:
      - 1025:1025
      - 8025:8025

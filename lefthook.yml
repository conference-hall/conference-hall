output: false

pre-commit:
  commands:
    formatter:
      run: pnpm format {staged_files} --no-error-on-unmatched-pattern
      stage_fixed: true
    linter:
      run: pnpm lint {staged_files}
      stage_fixed: true
      glob:
        - '*.ts'
        - '*.tsx'
        - '*.js'
        - '*.jsx'
